<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tab Domain Grouper</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fb;
        --surface: #ffffff;
        --text: #1f2937;
        --muted: #4b5563;
        --border: #d1d5db;
        --primary: #1e40af;
        --primary-hover: #1d4ed8;
        --danger: #9f1239;
        --danger-hover: #be123c;
        --ok: #065f46;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 320px;
        font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top right, #e5edff 0%, var(--bg) 45%);
      }

      .panel {
        margin: 12px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
        padding: 12px;
        box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 6px;
        font-size: 15px;
      }

      .hint {
        margin: 0 0 12px;
        font-size: 12px;
        color: var(--muted);
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 10px;
      }

      .badge {
        font-size: 12px;
        padding: 2px 8px;
        border-radius: 999px;
        border: 1px solid var(--border);
      }

      .badge.ok {
        color: var(--ok);
        border-color: #a7f3d0;
        background: #ecfdf5;
      }

      .badge.off {
        color: #92400e;
        border-color: #fde68a;
        background: #fffbeb;
      }

      .actions {
        display: grid;
        gap: 8px;
      }

      button {
        border: 1px solid transparent;
        border-radius: 8px;
        padding: 8px 10px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.12s ease;
      }

      button.primary {
        background: var(--primary);
        color: #fff;
      }

      button.primary:hover {
        background: var(--primary-hover);
      }

      button.ghost {
        border-color: var(--border);
        background: #fff;
        color: var(--text);
      }

      button.ghost:hover {
        background: #f3f4f6;
      }

      button.danger {
        background: var(--danger);
        color: #fff;
      }

      button.danger:hover {
        background: var(--danger-hover);
      }

      button:disabled {
        opacity: 0.65;
        cursor: default;
      }

      .status {
        margin-top: 10px;
        min-height: 18px;
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>Tab Domain Grouper</h1>
      <p class="hint">Group tabs by domain in the current window.</p>

      <div class="row">
        <strong>Auto group</strong>
        <span id="auto-state" class="badge">Loading...</span>
      </div>

      <div class="actions">
        <button id="group-btn" class="primary" type="button">Group current window</button>
        <button id="ungroup-btn" class="danger" type="button">Ungroup current window</button>
        <button id="toggle-btn" class="ghost" type="button">Toggle auto</button>
        <button id="options-btn" class="ghost" type="button">Open options</button>
      </div>

      <p id="status" class="status" role="status" aria-live="polite"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
